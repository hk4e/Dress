name: Check File Size

run-name: "PR #${{ github.event.pull_request.number || inputs.pr_number }} (${{ github.event.pull_request.head.sha || inputs.head_sha }})"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: number
      head_sha:
        description: Expected pull request head SHA
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  
jobs:
  check-size:
    runs-on: ubuntu-latest
    steps:
      - name: Check file sizes
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          EXPECTED_HEAD_SHA: ${{ inputs.head_sha }}
        with:
          script: |
            const MAX_SIZE = 1024 * 1024; // 1 MB
            const IMAGE_EXT = /\.(jpe?g|png|webp|tiff?|hei[cf]|avif|gif)$/i;
            const ACTIVE_STATUSES = new Set(['added', 'modified', 'renamed', 'copied']);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let pr = context.payload.pull_request;

            if (!pr) {
              const prNumber = Number(process.env.PR_NUMBER);
              if (!Number.isInteger(prNumber) || !process.env.EXPECTED_HEAD_SHA) {
                core.setFailed('Missing workflow dispatch inputs.');
                return;
              }

              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              pr = data;
              if (pr.state !== 'open' || pr.head.sha !== process.env.EXPECTED_HEAD_SHA) {
                core.setFailed('The pull request head no longer matches the requested commit.');
                return;
              }
            }

            const prNumber = pr.number;

            let oversized = [];
            let page = 1;
            let files = [];

            while (true) {
              const compare = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${pr.base.sha}...${pr.head.sha}`,
                per_page: 100,
                page
              });

              const pageFiles = compare.data.files || [];
              if (pageFiles.length === 0) break;

              files.push(...pageFiles);

              if (pageFiles.length < 100) break;
              page++;
            }

            const hasChangedImages = files.some(file =>
              ACTIVE_STATUSES.has(file.status) && IMAGE_EXT.test(file.filename)
            );
            if (!hasChangedImages) {
              core.setFailed('No changed images found.');
              return;
            }

            for (const file of files) {
              try {
                // 只检查新增或修改文件
                if (!ACTIVE_STATUSES.has(file.status))
                  continue;

                // 先编码 %，再编码 # 和 ?，避免双重编码问题。
                const encodedPath = file.filename
                  .replace(/%/g, '%25')
                  .replace(/#/g, '%23')
                  .replace(/\?/g, '%3F');

                const content = await github.rest.repos.getContent({
                  owner: pr.head.repo.owner.login,
                  repo: pr.head.repo.name,
                  path: encodedPath,
                  ref: pr.head.sha
                });

                const size = content.data.size;

                if (size > MAX_SIZE) {
                  oversized.push(`- ${file.filename} (${size} bytes)`);
                }
              } catch (error) {
                core.warning(`Skip file ${file.filename}: ${error.message}`);
                continue;
              }
            }

            if (oversized.length > 0) {
              const body = `
            我们注意到以下文件的大小超过了 1MB, 请在压缩后再次提交 Pull Request:
            We have noted that the following files exceed 1MB in size. Please resubmit your pull request after compressing them:

            ${oversized.join("\n")}
            
            ---
            
            <small>温馨提示: 您可以直接使用 \`/auto-fix\` 命令来自动修复这些文件。</small>
            <small>Warm reminder: You can use the \`/auto-fix\` command to automatically fix these files.</small>
              `.trim();

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });

              core.setFailed("File size check failed");
            } else {
              core.info("All changed files are under 1 MB.");
            }
